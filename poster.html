<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  background:
    radial-gradient(circle at top, rgba(201,162,39,0.14), transparent 32%),
    linear-gradient(180deg, #031407 0%, #062912 55%, #020903 100%);
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 18px;
  color: #fff;
}

.page {
  width: min(100%, 760px);
}

.poster-link {
  display: block;
  text-decoration: none;
  border-radius: 18px;
  overflow: hidden;
  box-shadow:
    0 0 70px rgba(0,0,0,0.75),
    0 0 28px rgba(201,162,39,0.16);
  background: #031407;
}

.poster-img {
  display: block;
  width: 100%;
  height: auto;
  border: 0;
}

.caption {
  margin-top: 14px;
  padding: 14px 16px;
  border: 1px solid rgba(201,162,39,0.62);
  border-radius: 16px;
  background: rgba(0,0,0,0.28);
  text-align: center;
  line-height: 1.45;
  box-shadow: 0 12px 28px rgba(0,0,0,0.25);
}

.caption .small {
  font-size: 13px;
  color: rgba(255,255,255,0.74);
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.caption .main {
  margin-top: 5px;
  font-size: 18px;
  font-weight: 900;
}

.caption .main strong {
  color: #d7a927;
}

.caption a {
  display: inline-block;
  margin-top: 8px;
  color: #fff;
  font-weight: 900;
  text-decoration: none;
  border-bottom: 1px solid rgba(215,169,39,0.75);
}

.actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 12px;
  flex-wrap: wrap;
}

.btn {
  border: 1px solid rgba(215,169,39,0.7);
  background: rgba(215,169,39,0.12);
  color: #f3d56b;
  border-radius: 999px;
  padding: 10px 15px;
  font-size: 13px;
  font-weight: 900;
  text-decoration: none;
  cursor: pointer;
}

.btn:hover {
  background: rgba(215,169,39,0.22);
}

@media (max-width: 520px) {
  body {
    padding: 0;
  }

  .page {
    width: 100%;
  }

  .poster-link {
    border-radius: 0;
    box-shadow: none;
  }

  .caption {
    margin: 0;
    border-left: none;
    border-right: none;
    border-radius: 0;
  }
}

@media print {
  body {
    background: #fff;
    padding: 0;
  }

  .page {
    width: 100%;
  }

  .poster-link {
    border-radius: 0;
    box-shadow: none;
  }

  .caption,
  .actions {
    display: none;
  }
}
</style>

<body>

<main class="page">

  <a class="poster-link" href="https://digiylyfe.com" target="_blank" rel="noopener">
    <img
      class="poster-img"

      alt="DIGIYLYFE — Le bonheur business est là ici"
    />
  </a>

  <div class="caption">
    <div class="small">Affiche officielle DIGIYLYFE</div>
    <div class="main">
      Tu cherches ou tu travailles ?
      <strong>Trouve maintenant.</strong>
    </div>
    <a href="https://digiylyfe.com" target="_blank" rel="noopener">
      digiylyfe.com
    </a>
  </div>

  <div class="actions">
    <a class="btn" href="https://digiylyfe.net/wp-content/uploads/2026/04/DIGIYLYFE_A4_v3-scaled.png" target="_blank" rel="noopener">
      Ouvrir l’image
    </a>

    <a class="btn" href="https://digiylyfe.com" target="_blank" rel="noopener">
      Aller sur DIGIYLYFE
    </a>
  </div>

</main>
